<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webamp Player • Zipasaurus 🦖</title>
    <script src="https://unpkg.com/webamp@1.4.2/built/webamp.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff41;
            --accent-glow: #00ff4180;
            --bg: #0a0f0a;
            --surface: rgba(20, 28, 20, 0.96);
            --text: #e0ffe0;
            --text-muted: #b0d0b0;
        }

        [data-theme="light"] {
            --accent: #00cc33;
            --bg: #f0f7f0;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1a2a1a;
            --text-muted: #445544;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .retro-font {
            font-family: 'Press Start 2P', sans-serif;
            letter-spacing: 2px;
        }

        /* SIDEBAR NAV */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 360px;
            background: rgba(10, 15, 10, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 255, 65, 0.2);
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: color 0.3s;
            margin-bottom: 2rem;
            text-align: center;
            text-decoration: none;
        }
        .logo:hover { color: #00ff60; }

        .sidebar nav ul {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            list-style: none;
            flex-grow: 1;
        }

        .sidebar nav ul li a {
            color: var(--text);
            text-decoration: none;
            padding: 1rem 1.4rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.05);
            display: block;
        }

        .sidebar nav ul li a:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 65, 0.15);
            color: var(--accent);
            transform: translateX(8px);
        }

        .sidebar nav ul li a.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #000;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: auto;
            align-self: center;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #000;
        }

        .hamburger {
            display: none;
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            font-size: 2rem;
            z-index: 1100;
            background: rgba(10,15,10,0.9);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        main {
            margin-left: 360px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        #webamp {
            width: 100%;
            max-width: 90%;
        }

        #webamp .window {
            position: relative !important;
            transform: none !important;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                padding: 1.5rem 0.8rem;
                align-items: center;
            }
            .logo {
                font-size: 0.9rem;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                margin-bottom: 3rem;
                transform: rotate(180deg);
            }
            .sidebar nav ul li a {
                padding: 1rem 0.8rem;
                text-align: center;
                font-size: 0.85rem;
            }
            main {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.4s ease;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            main {
                margin-left: 0;
            }
            .hamburger {
                display: flex;
            }
            #webamp {
                max-width: 100%;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <a href="index.html" class="logo retro-font">ZIPASAURUS 🦖</a>
        
        <nav>
            <ul>
                <li><a href="index.html">About</a></li>
                <li><a href="Projects.html">Projects</a></li>
                <li><a href="Setup.html">Setup</a></li>
                <li><a href="Socials.html">Socials</a></li>
                <li><a href="Gallery.html">Gallery</a></li>
                <li><a href="dj.html">DJ Zone</a></li>
                <li><a href="GDD.html">GDD</a></li>
            </ul>
        </nav>

        <button class="theme-toggle" onclick="toggleDarkMode()">☀️ / 🌙</button>
    </div>

    <!-- Hamburger for mobile -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>

    <main>
        <div id="webamp"></div>
    </main>

    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking on a link
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        });

        // Theme toggle
        function toggleDarkMode() {
            const currentTheme = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                e.target !== hamburger) {
                sidebar.classList.remove('active');
            }
        });

        // Initialize Webamp
        const webamp = new Webamp({
            initialTracks: [
                {
                    metaData: {
                        artist: "DJ Zipasaurus",
                        title: "HappyHardcore Mix 1"
                    },
                    url: "https://www.youtube.com/watch?v=TaeKXY6yR6A&",
                    duration: 180
                },
                {
                    metaData: {
                        artist: "DJ Zipasaurus",
                        title: "80s Vibe"
                    },
                    url: "/audio/80s-vibe.mp3",
                    duration: 240
                }
            ]
        });
        webamp.renderWhenReady(document.getElementById('webamp'));
    </script>
</body>
</html>
