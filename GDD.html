<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare – GDD Presentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Press+Start+2P&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff41;
            --bg: #0a0f0a;
            --surface: rgba(20, 30, 20, 0.88);
            --text: #e0ffe0;
            --text-muted: #a0c0a0;
        }

        [data-theme="light"] {
            --bg: #f0f7f0;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1a2a1a;
            --text-muted: #445544;
            --accent: #00cc33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .retro-font {
            font-family: 'Press Start 2P', sans-serif;
            letter-spacing: 2px;
        }

        /* SIDEBAR NAV */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 360px;
            background: rgba(10, 15, 10, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 255, 65, 0.2);
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: color 0.3s;
            margin-bottom: 2rem;
            text-align: center;
            text-decoration: none;
        }
        .logo:hover { color: #00ff60; }

        .sidebar nav ul {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            list-style: none;
            flex-grow: 1;
        }

        .sidebar nav ul li a {
            color: var(--text);
            text-decoration: none;
            padding: 1rem 1.4rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.05);
            display: block;
        }

        .sidebar nav ul li a:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 65, 0.15);
            color: var(--accent);
            transform: translateX(8px);
        }

        .sidebar nav ul li a.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #000;
        }

        /* Main Content */
        main {
            margin-left: 360px;
            min-height: 100vh;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: auto;
            align-self: center;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #000;
        }

        .hamburger {
            display: none;
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            font-size: 2rem;
            z-index: 1100;
            background: rgba(10,15,10,0.9);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Hero & Content */
        .hero {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,255,65,0.03) 1px, transparent 1px),
                        linear-gradient(to right, rgba(0,255,65,0.03) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
            z-index: -1;
        }
        .hero::after {
            content: '🦖';
            position: absolute;
            font-size: 25vw;
            opacity: 0.08;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            user-select: none;
        }
        .hero-content h1 {
            font-size: 4.8rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }
        .hero-content p {
            font-size: 1.3rem;
            max-width: 620px;
            margin: 0 auto 2.5rem;
            color: var(--text-muted);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .page {
            display: none;
            opacity: 0;
        }
        .page.active {
            display: block;
            opacity: 1;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,255,65,0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,255,65,0.15);
        }

        h2 {
            font-size: 2.3rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .slides {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 2rem 0;
        }

        .slides img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            display: block;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 1rem;
            margin: 2rem 0;
        }

        footer { margin-top: 5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                padding: 1.5rem 0.8rem;
                align-items: center;
            }
            .logo {
                font-size: 0.9rem;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                margin-bottom: 3rem;
                transform: rotate(180deg);
            }
            .sidebar nav ul li a {
                padding: 1rem 0.8rem;
                text-align: center;
                font-size: 0.85rem;
            }
            .sidebar nav ul li a span {
                display: none;
            }
            main {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.4s ease;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            main {
                margin-left: 0;
            }
            .hamburger {
                display: flex;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body data-theme="dark">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <a href="index.html" class="logo retro-font">ZIPASAURUS 🦖</a>
        
        <nav>
            <ul>
                <li><a href="index.html" class="nav-item">About</a></li>
                <li><a href="Projects.html" class="nav-item">Projects</a></li>
                <li><a href="Setup.html" class="nav-item">Setup</a></li>
                <li><a href="Socials.html" class="nav-item">Socials</a></li>
                <li><a href="Gallery.html" class="nav-item">Gallery</a></li>
                <li><a href="dj.html" class="nav-item">DJ Zone</a></li>
                <li><a href="GDD.html" class="nav-item">GDD</a></li>
            </ul>
        </nav>

        <button class="theme-toggle" onclick="toggleDarkMode()">☀️ / 🌙</button>
    </div>

    <!-- Hamburger for mobile -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>

    <main>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,<br>
                where sound is your only sense of safety.
            </p>
        </header>

        <div id="loading" class="loading">
            Loading slides... <span id="progress">0</span>/20
        </div>
        
        <div class="slides" id="slides"></div>

        <footer>Nightmare GDD Presentation • zipasaurus.me</footer>
    </div>
    </main>

    <script>
        const slidesPath = 'images/Nightmare-Powerpoint-Slides/';
        const totalSlides = 20;
        const extension = '.png';

        const slidesContainer = document.getElementById('slides');
        const loadingEl = document.getElementById('loading');
        const progressEl = document.getElementById('progress');

        let loadedCount = 0;

        function updateProgress() {
            progressEl.textContent = loadedCount;
        }

        // Auto-detect active page and set active class
        function setActiveNavItem() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.nav-item').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        setActiveNavItem();

        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking on a link
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        });

        // Theme toggle
        function toggleDarkMode() {
            const currentTheme = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                e.target !== hamburger) {
                sidebar.classList.remove('active');
            }
        });

        // Small delay to help GitHub Pages finish deploying
        setTimeout(() => {
            for (let i = 1; i <= totalSlides; i++) {
                const img = document.createElement('img');
                img.src = `${slidesPath}/${i}${extension}`;
                img.alt = `Slide ${i}`;

                img.onload = () => {
                    img.classList.add('loaded');
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                img.onerror = () => {
                    console.error(`Failed to load slide ${i} → ${img.src}`);
                    img.classList.add('error');
                    img.innerHTML = `❌ MISSING SLIDE ${i}<br><small>${img.src}</small>`;
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                slidesContainer.appendChild(img);
            }
            updateProgress();
        }, 1500);
    </script>
</body>
</html>
