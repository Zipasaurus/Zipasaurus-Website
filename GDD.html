<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nightmare – GDD Presentation</title>
    <style>
        :root {
            --bg: #050507;
            --fg: #e6e6eb;
            --accent: #6cf2ff;
            --muted: #8a8a96;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at center, rgba(108,242,255,0.08), transparent 60%),
                var(--bg);
            color: var(--fg);
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            margin: auto;
        }
        header {
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            position: relative;
        }
        h1::after {
            content: "";
            display: block;
            width: 140px;
            height: 3px;
            margin-top: 0.6rem;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .subtitle {
            color: var(--muted);
            margin-top: 0.8rem;
            font-size: 1.1rem;
            max-width: 700px;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--accent);
            font-size: 1.1rem;
        }
        .slides {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin-top: 2rem;
        }
        .slides img {
            width: 100%;
            max-width: 1200px;
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(108,242,255,0.15),
                0 0 120px rgba(0,0,0,0.9);
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .slides img.loaded {
            opacity: 1;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-align: right;
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,
                where sound is your only sense of safety.
            </p>
        </header>

        <div id="loading" class="loading">Loading slides... <span id="progress">0</span>/20</div>
        <div class="slides" id="slides"></div>

        <footer>
            Nightmare GDD Presentation • Slides loaded from local folder
        </footer>
    </div>

   <script>
    // === CONFIGURATION ===
    const slidesPath = 'images/Nightmare - powerpoint slides';  // ← NO trailing slash, NO leading slash
    const totalSlides = 20;
    const extension = '.png';

    const slidesContainer = document.getElementById('slides');
    const loadingEl = document.getElementById('loading');
    const progressEl = document.getElementById('progress');

    let loadedCount = 0;

    function updateProgress() {
        progressEl.textContent = loadedCount;
    }

    for (let i = 1; i <= totalSlides; i++) {
        const img = document.createElement('img');
        
        // Correct path construction (no extra space)
        img.src = `${slidesPath}/${i}${extension}`;
        
        img.alt = `Slide ${i}`;
        img.loading = "lazy";

        img.onload = () => {
            img.classList.add('loaded');
            loadedCount++;
            updateProgress();
            checkAllLoaded();
        };

        img.onerror = () => {
            console.error(`❌ Failed to load slide ${i} → ${img.src}`);
            img.style.border = "4px solid #ff4444";
            img.alt = `MISSING: Slide ${i}`;
            loadedCount++;
            updateProgress();
            checkAllLoaded();
        };

        slidesContainer.appendChild(img);
    }

    function checkAllLoaded() {
        if (loadedCount >= totalSlides) {
            setTimeout(() => {
                loadingEl.style.display = 'none';
            }, 400);
        }
    }

    updateProgress();
</script>
</body>
</html>
