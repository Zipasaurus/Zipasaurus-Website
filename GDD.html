<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nightmare – GDD Presentation</title>

    <style>
        :root {
            --bg: #050507;
            --fg: #e6e6eb;
            --accent: #6cf2ff;
            --muted: #8a8a96;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at center, rgba(108,242,255,0.08), transparent 60%),
                var(--bg);
            color: var(--fg);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            margin: auto;
        }

        header {
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
        }

        h1::after {
            content: "";
            display: block;
            width: 120px;
            height: 2px;
            margin-top: 0.5rem;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .subtitle {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 1rem;
            max-width: 600px;
        }

        .slides {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2rem;
        }

        .slides img {
            width: 100%;
            max-width: 1200px;
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(108,242,255,0.15),
                0 0 120px rgba(0,0,0,0.9);
            object-fit: contain;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--muted);
            text-align: right;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,
                where sound is your only sense of safety.
            </p>
        </header>

        <div class="slides" id="slides"></div>

        <footer>
            Slides loaded from local images
        </footer>
    </div>

    <script>
        // Relative path to the slides folder
        const slidesPath = 'images/';

        // Numbered images (you can adjust extension if needed)
        const totalSlides = 20; // change this to however many images you have
        const slidesContainer = document.getElementById('slides');

        for (let i = 1; i <= totalSlides; i++) {
            const img = document.createElement('img');
            img.src = `${slidesPath}${i}.png`; // assumes files named 1.png, 2.png, etc.
            img.alt = `Slide ${i}`;
            slidesContainer.appendChild(img);
        }
    </script>
</body>
</html>
