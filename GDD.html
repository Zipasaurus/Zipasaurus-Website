<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare – GDD Presentation</title>
    <style>
        :root {
            --bg: #050507;
            --fg: #e6e6eb;
            --accent: #6cf2ff;
            --muted: #8a8a96;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--fg);
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .container { max-width: 1250px; padding: 2rem 1.5rem; margin: auto; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 {
            font-size: 3rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
        }
        h1::after {
            content: "";
            display: block;
            width: 160px;
            height: 3px;
            margin: 0.8rem auto;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .subtitle { color: var(--muted); font-size: 1.15rem; max-width: 720px; margin: 0 auto; }
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--accent);
            font-size: 1.3rem;
        }
        .slides {
            display: flex;
            flex-direction: column;
            gap: 4rem;
            margin-top: 1rem;
        }
        .slides img {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
            min-height: 550px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(108,242,255,0.2);
            background: #1a1a22;
            border: 3px solid rgba(108,242,255,0.3);
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .slides img.loaded { opacity: 1; }
        .slides img.error {
            border: 8px solid #ff4444 !important;
            background: #2a0f0f !important;
            min-height: 300px;
            padding: 2rem;
            text-align: center;
        }
        footer { margin-top: 5rem; text-align: center; color: var(--muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,<br>
                where sound is your only sense of safety.
            </p>
        </header>

        <div id="loading" class="loading">
            Loading slides... <span id="progress">0</span>/20
        </div>
        
        <div class="slides" id="slides"></div>

        <footer>Nightmare GDD Presentation • zipasaurus.me</footer>
    </div>

    <script>
        const slidesPath = 'images/nightmare-slides';   // Make sure this matches your folder name exactly
        const totalSlides = 20;
        const extension = '.png';

        const slidesContainer = document.getElementById('slides');
        const loadingEl = document.getElementById('loading');
        const progressEl = document.getElementById('progress');

        let loadedCount = 0;

        function updateProgress() {
            progressEl.textContent = loadedCount;
        }

        // Small delay to help GitHub Pages finish deploying
        setTimeout(() => {
            for (let i = 1; i <= totalSlides; i++) {
                const img = document.createElement('img');
                img.src = `${slidesPath}/${i}${extension}`;
                img.alt = `Slide ${i}`;

                img.onload = () => {
                    img.classList.add('loaded');
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                img.onerror = () => {
                    console.error(`Failed to load slide ${i} → ${img.src}`);
                    img.classList.add('error');
                    img.innerHTML = `❌ MISSING SLIDE ${i}<br><small>${img.src}</small>`;
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                slidesContainer.appendChild(img);
            }
            updateProgress();
        }, 1500);   // 1.5 second delay
    </script>
</body>
</html>
