<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare – GDD Presentation</title>
    <style>
        :root {
            --bg: #0a0f0a;
            --fg: #e0ffe0;
            --accent: #00ff41;
            --muted: #b0d0b0;
        }

        [data-theme="light"] {
            --bg: #f0f7f0;
            --fg: #1a2a1a;
            --accent: #00cc33;
            --muted: #445544;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--fg);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        /* SIDEBAR NAV */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 360px;
            background: rgba(10, 15, 10, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 255, 65, 0.2);
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: color 0.3s;
            margin-bottom: 2rem;
            text-align: center;
            text-decoration: none;
        }
        .logo:hover { color: #00ff60; }

        .sidebar nav ul {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            list-style: none;
            flex-grow: 1;
        }

        .sidebar nav ul li a {
            color: var(--fg);
            text-decoration: none;
            padding: 1rem 1.4rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.05);
            display: block;
        }

        .sidebar nav ul li a:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 65, 0.15);
            color: var(--accent);
            transform: translateX(8px);
        }

        .sidebar nav ul li a.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #000;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.7rem 1.2rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: auto;
            align-self: center;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #000;
        }

        .hamburger {
            display: none;
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            font-size: 2rem;
            z-index: 1100;
            background: rgba(10,15,10,0.9);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,255,65,0.03) 1px, transparent 1px),
                        linear-gradient(to right, rgba(0,255,65,0.03) 1px, transparent 1px);
            background-size: 70px 70px;
            pointer-events: none;
            z-index: -1;
        }
        main {
            margin-left: 360px;
            min-height: 100vh;
        }

        .container { 
            max-width: 1250px; 
            padding: 2rem 1.5rem; 
            margin: auto; 
        }

        header { text-align: center; margin-bottom: 3rem; }

        h1 {
            font-size: 3rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0;
        }

        h1::after {
            content: "";
            display: block;
            width: 160px;
            height: 3px;
            margin: 0.8rem auto;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .subtitle { color: var(--muted); font-size: 1.15rem; max-width: 720px; margin: 0 auto; }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--accent);
            font-size: 1.3rem;
        }

        .slides {
            display: flex;
            flex-direction: column;
            gap: 4rem;
            margin-top: 1rem;
        }

        .slides img {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: block;
            min-height: 550px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.2);
            background: #1a1a22;
            border: 3px solid rgba(0, 255, 65, 0.3);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .slides img.loaded { opacity: 1; }

        .slides img.error {
            border: 8px solid #ff4444 !important;
            background: #2a0f0f !important;
            min-height: 300px;
            padding: 2rem;
            text-align: center;
        }

        footer { margin-top: 5rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
                padding: 1.5rem 0.8rem;
                align-items: center;
            }
            .logo {
                font-size: 0.9rem;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                margin-bottom: 3rem;
                transform: rotate(180deg);
            }
            .sidebar nav ul li a {
                padding: 1rem 0.8rem;
                text-align: center;
                font-size: 0.85rem;
            }
            main {
                margin-left: 360px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.4s ease;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            main {
                margin-left: 0;
            }
            .hamburger {
                display: flex;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body data-theme="dark">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <a href="index.html" class="logo">ZIPASAURUS 🦖</a>
        
        <nav>
            <ul>
                <li><a href="index.html">About</a></li>
                <li><a href="Projects.html">Projects</a></li>
                <li><a href="Setup.html">Setup</a></li>
                <li><a href="Socials.html">Socials</a></li>
                <li><a href="Gallery.html">Gallery</a></li>
                <li><a href="dj.html">DJ Zone</a></li>
                <li><a href="GDD.html" class="active">GDD</a></li>
            </ul>
        </nav>

    </div>

    <!-- Hamburger for mobile -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>

    <main>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,<br>
                where sound is your only sense of safety.
            </p>
        </header>

        <div id="loading" class="loading">
            Loading slides... <span id="progress">0</span>/20
        </div>
        
        <div class="slides" id="slides"></div>

        <footer>Nightmare GDD Presentation • zipasaurus.me</footer>
    </div>
    </main>

    <script>
        const slidesPath = 'images/Nightmare-Powerpoint-Slides/';
        const totalSlides = 20;
        const extension = '.png';

        const slidesContainer = document.getElementById('slides');
        const loadingEl = document.getElementById('loading');
        const progressEl = document.getElementById('progress');

        let loadedCount = 0;

        function updateProgress() {
            progressEl.textContent = loadedCount;
        }

        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking on a link
        document.querySelectorAll('.sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        });

        // Theme toggle
        function toggleDarkMode() {
            const currentTheme = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                e.target !== hamburger) {
                sidebar.classList.remove('active');
            }
        });

        // Small delay to help GitHub Pages finish deploying
        setTimeout(() => {
            for (let i = 1; i <= totalSlides; i++) {
                const img = document.createElement('img');
                img.src = `${slidesPath}/${i}${extension}`;
                img.alt = `Slide ${i}`;

                img.onload = () => {
                    img.classList.add('loaded');
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                img.onerror = () => {
                    console.error(`Failed to load slide ${i} → ${img.src}`);
                    img.classList.add('error');
                    img.innerHTML = `❌ MISSING SLIDE ${i}<br><small>${img.src}</small>`;
                    loadedCount++;
                    updateProgress();
                    if (loadedCount >= totalSlides) loadingEl.style.display = 'none';
                };

                slidesContainer.appendChild(img);
            }
            updateProgress();
        }, 1500);
    </script>
</body>
</html>
