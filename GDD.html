<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmare – GDD Presentation</title>
    <style>
        :root {
            --bg: #050507;
            --fg: #e6e6eb;
            --accent: #6cf2ff;
            --muted: #8a8a96;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at center, rgba(108,242,255,0.08), transparent 60%),
                var(--bg);
            color: var(--fg);
            font-family: "Segoe UI", system-ui, sans-serif;
            line-height: 1.5;
        }
        .container {
            max-width: 1250px;
            width: 100%;
            padding: 2rem 1.5rem;
            margin: auto;
        }
        header {
            margin-bottom: 3rem;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
        }
        h1::after {
            content: "";
            display: block;
            width: 160px;
            height: 3px;
            margin: 0.8rem auto;
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        .subtitle {
            color: var(--muted);
            font-size: 1.15rem;
            max-width: 720px;
            margin: 0 auto;
        }
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--accent);
            font-size: 1.2rem;
        }
        .slides {
            display: flex;
            flex-direction: column;
            gap: 3.5rem;
            margin-top: 1rem;
        }
        .slides img {
            width: 100%;
            max-width: 1200px;
            height: auto;
            min-height: 300px;           /* Prevents invisible slides */
            margin: 0 auto;
            border-radius: 14px;
            box-shadow:
                0 0 40px rgba(108,242,255,0.18),
                0 20px 80px rgba(0,0,0,0.85);
            object-fit: contain;
            background: #0a0a0f;         /* Dark background so white slides are visible */
            opacity: 0;
            transition: all 0.6s ease;
            border: 1px solid rgba(108,242,255,0.15);
        }
        .slides img.loaded {
            opacity: 1;
            transform: translateY(0);
        }
        footer {
            margin-top: 4rem;
            padding-top: 2rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-align: center;
            border-top: 1px solid rgba(108,242,255,0.1);
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nightmare</h1>
            <p class="subtitle">
                A horror game built around echolocation — navigate a world you cannot see,<br>
                where sound is your only sense of safety.
            </p>
        </header>

        <div id="loading" class="loading">
            Loading slides... <span id="progress">0</span>/20
        </div>
        
        <div class="slides" id="slides"></div>

        <footer>
            Nightmare GDD Presentation • Built as a single HTML file
        </footer>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const slidesPath = 'images/Nightmare - powerpoint slides';
        const totalSlides = 20;
        const extension = '.png';

        const slidesContainer = document.getElementById('slides');
        const loadingEl = document.getElementById('loading');
        const progressEl = document.getElementById('progress');

        let loadedCount = 0;

        function updateProgress() {
            progressEl.textContent = loadedCount;
        }

        // Create all slide images
        for (let i = 1; i <= totalSlides; i++) {
            const img = document.createElement('img');
            img.src = `${slidesPath}/${i}${extension}`;
            img.alt = `Nightmare GDD Slide ${i}`;
            img.loading = "lazy";

            // On successful load
            img.onload = () => {
                img.classList.add('loaded');
                loadedCount++;
                updateProgress();
                checkIfAllLoaded();
            };

            // On load error (missing file, wrong name, etc.)
            img.onerror = () => {
                console.error(`Failed to load slide ${i}: ${img.src}`);
                img.style.border = "4px solid #ff5555";
                img.style.minHeight = "400px";
                img.style.background = "#1a0000";
                img.alt = `MISSING: Slide ${i}`;
                loadedCount++;
                updateProgress();
                checkIfAllLoaded();
            };

            slidesContainer.appendChild(img);
        }

        function checkIfAllLoaded() {
            if (loadedCount >= totalSlides) {
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                }, 600);
            }
        }

        // Keyboard navigation (left/right arrows)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                window.scrollBy({ top: window.innerHeight * 0.85, behavior: 'smooth' });
            }
            if (e.key === 'ArrowLeft') {
                window.scrollBy({ top: -window.innerHeight * 0.85, behavior: 'smooth' });
            }
        });

        // Initial progress
        updateProgress();
    </script>
</body>
</html>
